      items:
        - text: >-
            Organisation très professionnelle,excellents guides,hôtels conformes à notre demande,programme bien
            équilibré,bref:une réussite. Très satisfait des prestations de AucoeurVietnam lors de chacun des voyages que
            nous avons eu la bonheur de vivre.
          author: Reconnaissance
        - text: >-
            Nous avons passé un formidable voyage au Vietnam ( nous avons fait le Nord et le Sud, pas le Centre), on
            revient enchantés avec des souvenirs et de magnifiques images pleins la tête ! Tout a été parfaitement
            organisé et fluide ! Nous avions demandé un voyage hors des sentiers battus, pas touristique et le contrat a
            été…
          author: Johanna
        - text: >-
            Nous revenons enchantés de notre voyage organisé (pour notre groupe de 27 personnes) par l agence locale
            AucoeurVietnam – notre conseillère pour déterminer le circuit et notre guide sur place ont été d un grande
            gentillesse et ont été à l écoute de toutes nos attentes, surpassant même parfois celles-ci avec un grand
            professionnalisme, une…
          author: Carine
        - text: >-
            Très beau voyage conforme à mes souhaits petits déplacements, marche vélo , découverte hors des sentiers
            battus, logements qualitatifs et guides et chauffeurs sérieux et à l’écoute. Un seul bémol, la 2eme semaine
            les températures ont fortement baissé, et la chambre d’hôtes pourtant sympa, n’était pas adaptée pour ce
            type de température , nous avons eu trop…
          author: Corinne
        - text: >-
            Nous vous remercions énormément pour l’ensemble du séjour : vous avez su nous proposer, et mettre en place
            tout cela en un temps record ! bravo ! Nous avons été enchantés par ce séjour, ces belles découvertes, ces
            paysages, ces magnifiques rencontres : avec les guides surtout, mais de façon générale nous n’avons vu que
            des gens accueillants, souriants…
          author: Benoît
        - text: >-
            Nous l’avons rêvé, nous l’avons vécu! D’Hanoi a la baie de Tu Long, puis Luang Prabang et enfin Siem Reap.
            Des cascades d’images merveilleuses et de moments intenses qui resteront à jamais d’excellents souvenirs,
            tout cela grâce à l’accompagnement parfaitement orchestré par Cuc qui a aussi su s’adapter à nos ‘caprices’,
            toujours avec réactivité, efficacité…
          author: Laurence et Yves
  - type: team
