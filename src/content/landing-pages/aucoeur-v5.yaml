          url: https://aucoeurvietnam.com/vos-conseillers-de-voyage-locaux/
      members:
        - name: CUC NGUYEN
          title: Experte des croisières Mékong
          description: "“Je me suis profondément attachée aux régions et aux cultures variées du Vietnam et du Cambodge. Les plages exotiques, le delta du Mékong paisible, les marchés flottants…\_»"
          image: https://aucoeurvietnam.com/wp-content/uploads/2023/12/conseiller-de-voyage-cuc-nguyen-1.jpeg
        - name: QUEEN-ANNE
          title: Expert Laos et Nord Vietnam
          description: >-
            “Avec plus de dix ans d’expérience en tant que guide touristique au Laos et dans le Nord du Vietnam, je me
            suis spécialisée dans la création d’expériences immersives en pleine nature.”
          image: https://aucoeurvietnam.com/wp-content/uploads/2024/01/conseillere-de-voyage-au-Vietnam-Quynh-Anh.jpg
        - name: TRAM NGUYEN
          title: Experte des voyages combinés
          description: >-
            “La curiosité que j’ai pour mon pays n’a cessé de grandir au fil de découvertes. J’adore parcourir le
            Vietnam et immortaliser la beauté de ses paysages, de ses locaux avec mon appareil photo.”
          image: https://aucoeurvietnam.com/wp-content/uploads/2023/12/conseiller-de-voyage-tram-nguyen-1.jpg
        - name: DARTIS HOANG
          title: Expert des voyages au Vietnam
          description: >-
            “Avec son histoire millénaire et sa culture vibrante, le Vietnam suscite en moi une passion pour le domaine
            du tourisme. En tant que conseiller dynamique, je serais ravi de vous faire découvrir l’enchantement du
            Vietnam”
          image: https://aucoeurvietnam.com/wp-content/uploads/2025/05/dartis-conseiller-de-voyage-aucoeurvietnam.jpg
        - name: LAETITIA TRAN
          title: Experte des voyages culturels
          description: >-
            “J’aime découvrir l’histoire et la culture de mon pays. C’est pour cet amour que je m’engage dans le
            tourisme pour vous apporter un Vietnam avec toutes ses beautés charmante et ses valeurs variées.”
          image: https://aucoeurvietnam.com/wp-content/uploads/2025/07/laetitia-conseillere.jpg
      heading: Vos conseillers de voyage
