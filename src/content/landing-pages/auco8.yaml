  - type: how-it-works
    title: Faites créer votre voyage au Vietnam en 3 étapes !
    description: '_Votre voyage au Vietnam sur mesure : nos conseillers le façonnent selon vos préférences !_'
    items:
      - title: Premier contact
        description: >-
          Vous laissez vos coordonnées et notre conseiller de voyage vous appelera. Partagez-leur vos envies pour ce
          voyage au Vietnam. N’hésitez pas à leur poser des questions concernant vos incertitudes, vos préoccupations.
        image: https://aucoeurvietnam.com/wp-content/uploads/2023/12/etape-1.png
        icon: 1️⃣
      - title: Personnalisation
        description: >-
          Une fois que vous avez reçu le premier devis, poursuivez les échanges avec votre conseiller de voyage afin de
          le personnaliser en fonction de vos préférences, jusqu’à ce qu’il corresponde bien à vos attentes.
        image: https://aucoeurvietnam.com/wp-content/uploads/2023/12/etape-2.png
        icon: 2️⃣
      - title: Voyage
        description: >-
          Une fois sur place, nous vous offrons une assistance 24/7, travaillant en étroite collaboration avec nos
          partenaires locaux pour assurer la flexibilité totale, l’authenticité et l’immersion complète de votre voyage.
        image: https://aucoeurvietnam.com/wp-content/uploads/2023/12/etape-3.png
        icon: 3️⃣
