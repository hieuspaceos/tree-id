title: ClaudeKit - AI Development & Marketing Teams
sections:
  - type: nav
    order: -1
    enabled: true
    data:
      brandName: ClaudeKit
      logo: https://claudekit.cc/logo.png
      links:
        - label: Home
          href: /
        - label: Products
          href: '#'
        - label: Blog
          href: /blog
        - label: Community
          href: https://claudekit.cc/discord
        - label: Docs
          href: https://docs.claudekit.cc
        - label: Referrals
          href: '#'
      variant: default
      cta:
        - text: Account Dashboard
          url: /account/dashboard
          variant: outline
        - text: Purchase
          url: '#'
          variant: primary
    style:
      fullWidth: true
      background: rgba(14,14,14,0.8)
      textColor: var(--text-primary)
      textMutedColor: var(--text-secondary)
  - type: hero
    order: 0
    enabled: true
    data:
      headline: Ship Faster With AI Dev Teams
      subheadline: Production-ready AI subagents automate your development & marketing workflows. Build in hours, not weeks.
      variant: split
      embed: https://cdn.claudekit.cc/videos/claudekit-intro-v2.mp4
      cta:
        - text: Get Engineer Kit — $99
          url: /engineer#pricing
          variant: primary
        - text: Get Marketing Kit - $99
          url: '#'
          variant: secondary
        - text: Get The Bundle (Engineer + Marketing) →
          url: '#products'
          variant: text
    style:
      fullWidth: true
      background: linear-gradient(to bottom right, rgba(217,119,87,0.05), rgba(212,162,127,0.03))
      textColor: null
  - type: features
    order: 1
    enabled: true
    data:
      heading: Tired of Wrestling With Claude Code?
      subheading: You know Claude is powerful, but getting consistent, production-quality output is frustrating.
      variant: grid
      columns: 3
      items:
        - title: Context Spirals
          description: Token limits eating your budget while Claude loses track of project context across sessions
        - title: Inconsistent Output
          description: Every session feels like starting over - different code styles, missed requirements, quality variance
        - title: Manual Workflows
          description: Copy-pasting prompts between projects, rebuilding the same patterns over and over
    style:
      background: '#222222'
      textColor: '#ffffff'
  - type: stats
    order: 2
    enabled: true
    data:
      heading: 'ClaudeKit: Your AI Development & Marketing Teams'
      subheading: Production-ready subagents, workflows, and integrations that transform Claude Code into a powerhouse.
      variant: cards
      items:
        - value: 108+
          label: Skills
          description: Pre-built AI skills for dev, marketing, research, and automation
        - value: 95+
          label: Commands
          description: Slash commands covering entire SDLC & marketing funnel
        - value: '45'
          label: AI Agents
          description: 17 Engineer + 28 Marketing specialized agents
    style:
      background: '#1a1a1a'
      textColor: '#ffffff'
  - type: pricing
    order: 3
    enabled: true
    data:
      heading: Choose Your AI Team
      subheading: Both kits work seamlessly with Claude Code
      variant: highlight-center
      plans:
        - name: Engineer Kit
          description: 60+ skills, 30+ workflows, and AI subagents for fullstack development
          price: $99
          period: one-time
          features:
            - Frontend & backend skills
            - Database management
            - DevOps automation
            - Code review & debugging
          cta:
            text: Learn More →
            url: /engineer
          highlighted: true
          badge: Most Popular
        - name: Marketing Kit
          description: 12+ MCP integrations, 3 workflows for research, sales & growth
          price: $99
          period: one-time
          features:
            - Lead generation automation
            - Email & programmatic SEO
            - CRM integrations
            - Marketing subagents
          cta:
            text: Learn More →
            url: /marketing
          highlighted: false
    style:
      background: '#1a1a1a'
      textColor: '#ffffff'
  - type: testimonials
    order: 4
    enabled: true
    data:
      heading: What Customers Are Saying
      subheading: Real feedback from developers using ClaudeKit in production
      variant: carousel
      items:
        - quote: >-
            “Tried @Goon's .claude file from the human-mcp repo and it's really impressive. Need to test it more to
            truly appreciate it. Hope this helps everyone.”
          name: Hoan Nguyen
          avatar: https://claudekit.cc/assets/testimonials/01.png
        - quote: “Your amazing”
          name: Philonik
          avatar: https://claudekit.cc/assets/testimonials/02.jpeg
        - quote: >-
            “Duy Nguyen has claudekit. I find it much more stable, the whole project doesn't break. Currently my 20x
            package is limited because I need to review everything carefully, I don't know why Claude AI has developed
            so many unnecessary things, and many duplicates, but I don't know how to fix it either. So having your kit
            is like hitting gold.”
          name: Lương Thanh Thế
          avatar: https://claudekit.cc/assets/testimonials/03.jpeg
        - quote: >-
            “anyway, been playing with claudekit all day, so far so good! the /plan and /cook feature, very impressive
            😄”
          name: Zachary Nguyen
          avatar: https://claudekit.cc/assets/testimonials/04.jpeg
        - quote: “no kit yet, just 8 hours with kit, now 16 hours =)))”
          name: cesc
          avatar: https://claudekit.cc/assets/testimonials/05.png
        - quote: “Confirming it's super smooth, it fixed all the CodeRabbit issues it found. Worth the $30/month, big time!”
          name: Anonymous
          avatar: https://claudekit.cc/assets/testimonials/06.jpeg
        - quote: >-
            “I completed the feature for iamhere.to with just a single prompt. #ClaudeKit by @goon_nguyen is truly
            effective.”
          name: LAM (@laingoclam)
          avatar: https://claudekit.cc/assets/testimonials/07.jpeg
        - quote: “This speed is really impressive, first time seeing it so calm again”
          name: Zachary Nguyen
          avatar: https://claudekit.cc/assets/testimonials/08.jpeg
        - quote: >-
            “using AI tools, bought this kit, now understanding how convenient it is for coders. Opening the project and
            running 2-3 claude instances doing different features but still feeling confident”
          name: Hải Đăng
          avatar: https://claudekit.cc/assets/testimonials/09.jpeg
        - quote: >-
            “Cooking all day and night. Admit there's no plan, cook, test always, claude code is really easy to get
            confused. plus the docs are aligned with everything. Before telling claude code it would take a while to
            align the project, but only within 1 session it's all in. now having claude kit is really convenient.”
          name: Mr The
          avatar: https://claudekit.cc/assets/testimonials/10.jpeg
        - quote: >-
            “I really like its structured proceed with specialized agents. Really considering upgrading to max because
            the process with this is amazing.”
          name: Florin Makes (@florinmakes)
          avatar: https://claudekit.cc/assets/testimonials/11.jpeg
        - quote: “Used CK for 2 days and got cursed by colleagues. Specifically, too free so got cursed 🤣”
          name: phuongdeptrai
          avatar: https://claudekit.cc/assets/testimonials/12.jpeg
    style:
      background: '#faf6f1'
  - type: cta
    order: 5
    enabled: true
    data:
      headline: Ready to 10x Your Productivity?
      subheadline: Join hundreds of happy builders using ClaudeKit
      variant: default
      cta:
        - text: Get Engineer Kit — $99
          url: /engineer#pricing
          variant: outline
        - text: Get Marketing Kit — $99
          url: /marketing#pricing
          variant: outline
        - text: Get ClaudeKit Combo - $149
          url: '#'
          variant: primary
    style:
      fullWidth: true
      background: linear-gradient(to bottom right, rgba(217,119,87,0.1), rgba(212,162,127,0.05))
