label: Customers
description: Customer records for CRM-style tracking
fields:
  - name: name
    type: text
    label: Full Name
    required: true
  - name: email
    type: text
    label: Email Address
    required: true
  - name: company
    type: text
    label: Company
  - name: status
    type: select
    label: Status
    options:
      - lead
      - active
      - churned
  - name: notes
    type: textarea
    label: Notes
  - name: tags
    type: array
    label: Tags
  - name: joinedAt
    type: date
    label: Joined At
